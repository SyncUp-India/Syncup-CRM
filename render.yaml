services:
  - type: web
    name: syncup-crm-api
    runtime: node
    buildCommand: npm install && cd packages/api && npx prisma generate && npx tsc
    startCommand: node packages/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000
